name: Benchmark

on:
  schedule:
    - cron: '0 6 * * *'  # Daily 6am UTC
  workflow_dispatch:

concurrency:
  group: benchmark
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

permissions:
  contents: write

jobs:
  microbench:
    name: Microbench (${{ matrix.profile }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include:
          - profile: small
            scale: "0.05"
          - profile: medium
            scale: "0.25"
          - profile: large
            scale: "1.0"
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true

      - uses: Swatinem/rust-cache@v2

      - name: Build benchmark
        run: cargo build --release -p surge-bench

      - name: Run benchmark
        run: |
          cargo run --release -p surge-bench -- \
            --scale ${{ matrix.scale }} \
            --scenario full-release \
            --zstd-levels 3 \
            --skip-classic-diff \
            --skip-installers \
            --skip-update-scenario \
            --json --benchmark-format \
            > benchmark-results.json

      - name: Store results
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: "Surge Micro (${{ matrix.profile }})"
          tool: customSmallerIsBetter
          output-file-path: benchmark-results.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
          alert-threshold: '150%'
          comment-on-alert: true
          fail-on-alert: false
          gh-pages-branch: gh-pages
          benchmark-data-dir-path: dev/bench/micro

  update-chains:
    name: Update Chain (${{ matrix.profile }})
    needs: microbench
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include:
          - profile: localized-chain
            scenario: sdk-only
            num_deltas: "100"
          - profile: broad-chain
            scenario: full-release
            num_deltas: "10"
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true

      - uses: Swatinem/rust-cache@v2

      - name: Build benchmark
        run: cargo build --release -p surge-bench

      - name: Run benchmark
        run: |
          cargo run --release -p surge-bench -- \
            --update-only \
            --scale 1.0 \
            --scenario ${{ matrix.scenario }} \
            --num-deltas ${{ matrix.num_deltas }} \
            --pack-zstd-level 3 \
            --pack-memory-mb 256 \
            --json --benchmark-format \
            > benchmark-results.json

      - name: Store results
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: "Surge Update (${{ matrix.profile }})"
          tool: customSmallerIsBetter
          output-file-path: benchmark-results.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
          alert-threshold: '150%'
          comment-on-alert: true
          fail-on-alert: false
          gh-pages-branch: gh-pages
          benchmark-data-dir-path: dev/bench/update

  installers:
    name: Installers (medium)
    needs: update-chains
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true

      - uses: Swatinem/rust-cache@v2

      - name: Build benchmark and installer tools
        run: cargo build --release -p surge-bench -p surge-cli -p surge-installer

      - name: Run benchmark
        env:
          SURGE_INSTALLER_BINARY: target/release/surge
          SURGE_INSTALLER_LAUNCHER: target/release/surge-installer
        run: |
          cargo run --release -p surge-bench -- \
            --installers-only \
            --scale 0.25 \
            --pack-zstd-level 3 \
            --json --benchmark-format \
            > benchmark-results.json

      - name: Store results
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: "Surge Installers (medium)"
          tool: customSmallerIsBetter
          output-file-path: benchmark-results.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
          alert-threshold: '150%'
          comment-on-alert: true
          fail-on-alert: false
          gh-pages-branch: gh-pages
          benchmark-data-dir-path: dev/bench/installers
