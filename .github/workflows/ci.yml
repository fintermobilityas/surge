name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  version:
    name: Version
    runs-on: ubuntu-latest
    outputs:
      semver: ${{ steps.gitversion.outputs.semVer }}
      major: ${{ steps.gitversion.outputs.major }}
      minor: ${{ steps.gitversion.outputs.minor }}
      patch: ${{ steps.gitversion.outputs.patch }}
      prerelease: ${{ steps.gitversion.outputs.preReleaseLabel }}
      nuget: ${{ steps.gitversion.outputs.semVer }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Verify GitVersion and Cargo baseline versions are aligned
        run: ./scripts/check-version-sync.sh
      - uses: gittools/actions/gitversion/setup@v4.3.3
        with:
          versionSpec: '6.x'
      - id: gitversion
        uses: gittools/actions/gitversion/execute@v4.3.3

  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6
      - run: rustup component add rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
      - uses: Swatinem/rust-cache@v2
      - run: rustup component add clippy
      - run: cargo clippy --all-targets --all-features -- -D warnings

  clippy-strict:
    name: clippy strict
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
      - uses: Swatinem/rust-cache@v2
      - run: rustup component add clippy
      - run: cargo clippy --workspace --lib --bins --examples -- -D warnings -D clippy::unwrap_used -D clippy::expect_used

  clippy-pedantic:
    name: clippy pedantic (advisory)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
      - uses: Swatinem/rust-cache@v2
      - run: rustup component add clippy
      - name: Run pedantic audit (non-blocking)
        run: |
          cargo clippy --workspace --all-targets --all-features -- -D warnings -W clippy::pedantic || {
            echo "::warning::Pedantic lint debt detected (non-blocking advisory job)."
          }

  linux:
    name: Linux x64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
      - uses: Swatinem/rust-cache@v2
        with:
          key: linux-release
      - run: cargo build --release
      - run: cargo test --release
      - name: Upload artifacts
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v7
        with:
          name: linux-x64
          path: |
            target/release/libsurge.so
            target/release/surge
            target/release/surge-supervisor

  windows:
    name: Windows x64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
      - uses: Swatinem/rust-cache@v2
        with:
          key: windows-release
      - run: cargo build --release
      - run: cargo test --release
      - name: Upload artifacts
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v7
        with:
          name: win-x64
          path: |
            target/release/surge.dll
            target/release/surge.dll.lib
            target/release/surge.exe
            target/release/surge-supervisor.exe

  macos:
    name: macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
      - uses: Swatinem/rust-cache@v2
        with:
          key: macos-release
      - run: cargo build --release
      - run: cargo test --release
      - name: Upload artifacts
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v7
        with:
          name: osx-x64
          path: |
            target/release/libsurge.dylib
            target/release/surge
            target/release/surge-supervisor

  dotnet:
    name: .NET
    runs-on: ubuntu-latest
    needs: [version]
    defaults:
      run:
        working-directory: dotnet
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
      - uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ hashFiles('dotnet/Directory.Packages.props') }}
          restore-keys: nuget-
      - run: dotnet restore
      - run: dotnet format --verify-no-changes --verbosity diagnostic
      - run: dotnet build --no-restore --configuration Release -p:Version=${{ needs.version.outputs.semver }}
      - run: dotnet test --no-build --configuration Release --verbosity normal

  nuget:
    name: Publish NuGet
    runs-on: ubuntu-latest
    needs: [version, clippy, clippy-strict, linux, windows, macos, dotnet]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    defaults:
      run:
        working-directory: dotnet
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
      - uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ hashFiles('dotnet/Directory.Packages.props') }}
          restore-keys: nuget-
      - name: Pack
        run: dotnet pack Surge.NET/Surge.NET.csproj --configuration Release -p:Version=${{ needs.version.outputs.nuget }} --output ../nupkgs
      - name: Push to NuGet
        run: dotnet nuget push ../nupkgs/*.nupkg --source nuget.org --api-key ${{ secrets.PETERSUNDE_NUGET_ORG_API_KEY }} --skip-duplicate

  cargo-cloudsmith-publish:
    name: Publish Cargo (Cloudsmith)
    runs-on: ubuntu-latest
    needs: [version, clippy, clippy-strict, linux, windows, macos, dotnet]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop') && secrets.CLOUDSMITH_API_KEY != ''
    env:
      CLOUDSMITH_API_KEY: ${{ secrets.CLOUDSMITH_API_KEY }}
      CLOUDSMITH_NAMESPACE: finter-as
      CLOUDSMITH_REPOSITORY: surge
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
      - uses: Swatinem/rust-cache@v2
      - name: Set version
        run: |
          sed -i 's/^version = ".*"/version = "${{ needs.version.outputs.semver }}"/' Cargo.toml
          sed -i -E 's/(surge-core = \{ path = "crates\/surge-core", version = ").*(" \})/\1${{ needs.version.outputs.semver }}\2/' Cargo.toml
          cargo generate-lockfile
      - name: Package surge-core and surge-cli
        run: |
          cargo package -p surge-core --allow-dirty
          cargo package -p surge-cli --allow-dirty
      - name: Install Cloudsmith CLI
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install cloudsmith-cli
      - name: Publish surge-core to Cloudsmith
        run: |
          cloudsmith push cargo \
            "${CLOUDSMITH_NAMESPACE}/${CLOUDSMITH_REPOSITORY}" \
            "target/package/surge-core-${{ needs.version.outputs.semver }}.crate" \
            --api-key "${CLOUDSMITH_API_KEY}" \
            --republish
      - name: Publish surge-cli to Cloudsmith
        run: |
          cloudsmith push cargo \
            "${CLOUDSMITH_NAMESPACE}/${CLOUDSMITH_REPOSITORY}" \
            "target/package/surge-cli-${{ needs.version.outputs.semver }}.crate" \
            --api-key "${CLOUDSMITH_API_KEY}" \
            --republish

  release:
    name: Draft Release
    runs-on: ubuntu-latest
    needs: [version, clippy, clippy-strict, linux, windows, macos, dotnet]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Package release assets
        run: |
          cd artifacts
          tar czf ../surge-linux-x64.tar.gz -C linux-x64 .
          tar czf ../surge-osx-x64.tar.gz -C osx-x64 .
          cd win-x64 && zip -r ../../surge-win-x64.zip . && cd ..

      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.version.outputs.semver }}
          name: v${{ needs.version.outputs.semver }}
          draft: true
          generate_release_notes: true
          files: |
            surge-linux-x64.tar.gz
            surge-osx-x64.tar.gz
            surge-win-x64.zip
            include/surge/surge_api.h
