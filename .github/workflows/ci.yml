name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  version-sync:
    name: Version Sync
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v7
      - name: Verify workspace versions are aligned
        run: ./scripts/check-version-sync.sh
      - id: version
        name: Read workspace version
        run: |
          source ./scripts/version-lib.sh
          echo "version=$(workspace_base_version)" >> "$GITHUB_OUTPUT"

  vendor-sync:
    name: Vendor Sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: true
      - name: Verify surge-core vendor snapshot
        run: ./scripts/sync-surge-core-vendor.sh --check

  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v7
      - run: rustup component add rustfmt
      - run: cargo fmt --all -- --check

  maintainability:
    name: maintainability
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Run maintainability guardrail
        run: ./scripts/check-maintainability.sh

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: true
      - uses: Swatinem/rust-cache@v2
        with:
          cache-bin: false
          prefix-key: v1-rust-no-bin
      - run: rustup component add clippy
      - run: cargo clippy --all-targets --all-features -- -D warnings

  clippy-strict:
    name: clippy strict
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: true
      - uses: Swatinem/rust-cache@v2
        with:
          cache-bin: false
          prefix-key: v1-rust-no-bin
      - run: rustup component add clippy
      - run: cargo clippy --workspace --lib --bins --examples -- -D warnings -D clippy::unwrap_used -D clippy::expect_used

  clippy-pedantic:
    name: clippy pedantic (advisory)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: true
      - uses: Swatinem/rust-cache@v2
        with:
          cache-bin: false
          prefix-key: v1-rust-no-bin
      - run: rustup component add clippy
      - name: Run pedantic audit (non-blocking)
        run: |
          cargo clippy --workspace --all-targets --all-features -- -D warnings -W clippy::pedantic || {
            echo "::warning::Pedantic lint debt detected (non-blocking advisory job)."
          }

  rust-test:
    name: Rust tests (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: Linux x64
            cache_key: linux-test
          - os: windows-latest
            name: Windows x64
            cache_key: windows-test
          - os: macos-latest
            name: macOS
            cache_key: macos-test
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: true
      - uses: Swatinem/rust-cache@v2
        with:
          cache-bin: false
          key: ${{ matrix.cache_key }}
          prefix-key: v1-rust-no-bin
      - run: cargo test --release

  rust-artifacts:
    name: Rust artifacts (${{ matrix.name }})
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: Linux x64
            cache_key: linux-artifacts
            artifact_name: linux-x64
            build_strategy: host
            artifact_path: |
              target/release/libsurge.so
              target/release/surge
              target/release/surge-installer
              target/release/surge-installer-ui
              target/release/surge-supervisor
          - os: ubuntu-24.04-arm
            name: Linux arm64
            cache_key: linux-arm64-artifacts
            artifact_name: linux-arm64
            artifact_path: artifacts/linux-arm64
            build_strategy: ubuntu18-container
            glibc_max: "2.27"
          - os: windows-latest
            name: Windows x64
            cache_key: windows-artifacts
            artifact_name: win-x64
            build_strategy: host
            artifact_path: |
              target/release/surge.dll
              target/release/surge.dll.lib
              target/release/surge.exe
              target/release/surge-installer.exe
              target/release/surge-installer-ui.exe
              target/release/surge-supervisor.exe
          - os: macos-latest
            name: macOS
            cache_key: macos-artifacts
            artifact_name: osx-x64
            build_strategy: host
            artifact_path: |
              target/release/libsurge.dylib
              target/release/surge
              target/release/surge-installer
              target/release/surge-installer-ui
              target/release/surge-supervisor
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: true
      - uses: actions/cache@v6
        if: matrix.build_strategy == 'ubuntu18-container'
        with:
          path: |
            .cargo-bionic
            .rustup-bionic
            target-bionic
          key: ${{ runner.os }}-${{ runner.arch }}-${{ matrix.cache_key }}-${{ hashFiles('Cargo.lock', 'rust-toolchain.toml', 'scripts/build-linux-arm64-ubuntu18.sh', 'scripts/check-glibc-baseline.sh', 'scripts/stage-toolchain-artifact.sh') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-${{ matrix.cache_key }}-
      - uses: Swatinem/rust-cache@v2
        if: matrix.build_strategy != 'ubuntu18-container'
        with:
          cache-bin: false
          key: ${{ matrix.cache_key }}
          prefix-key: v1-rust-no-bin
      - run: cargo build --release
        if: matrix.build_strategy != 'ubuntu18-container'
      - name: Build Linux arm64 artifacts in Ubuntu 18.04
        if: matrix.build_strategy == 'ubuntu18-container'
        run: ./scripts/build-linux-arm64-ubuntu18.sh --output artifacts/linux-arm64 --with-gui
      - name: Validate Linux arm64 glibc baseline
        if: matrix.build_strategy == 'ubuntu18-container'
        run: |
          ./scripts/check-glibc-baseline.sh --max "${{ matrix.glibc_max }}" \
            artifacts/linux-arm64/surge \
            artifacts/linux-arm64/surge-supervisor \
            artifacts/linux-arm64/surge-installer \
            artifacts/linux-arm64/surge-installer-ui \
            artifacts/linux-arm64/libsurge.so
      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}

  dotnet:
    name: .NET
    runs-on: ubuntu-latest
    needs: [version-sync]
    defaults:
      run:
        working-directory: dotnet
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: true
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.301'
      - uses: actions/cache@v6
        with:
          path: ~/.nuget/packages
          key: nuget-${{ hashFiles('dotnet/Directory.Packages.props') }}
          restore-keys: nuget-
      - run: dotnet restore
      - run: dotnet format --verify-no-changes --verbosity diagnostic
      - run: dotnet build --no-restore --configuration Release -p:Version=${{ needs.version-sync.outputs.version }}
      - run: dotnet test --no-build --configuration Release --verbosity normal
      - name: Restore AOT/trim smoke app
        run: dotnet restore Surge.NET.AotSmoke/Surge.NET.AotSmoke.csproj --runtime linux-x64
      - name: Publish AOT/trim smoke app
        run: >
          dotnet publish Surge.NET.AotSmoke/Surge.NET.AotSmoke.csproj
          --no-restore
          --configuration Release
          --runtime linux-x64
          -p:PublishAot=true
          -p:PublishTrimmed=true
          -p:SelfContained=true
          -p:InvariantGlobalization=true
          -warnaserror
          -m:1
